<!DOCTYPE html>
<html lang="en">
<head>  <meta charset="UTF-8" />  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <title>Beat 6 — CTA Close</title>  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js">

</script>
  
<style>    * { margin: 0; padding: 0; box-sizing: border-box; }    body { background: #0A0A0A; overflow: hidden; }    .scene { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; overflow: hidden; display: none; }    #scene6 { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0A0A0A; }    .radial-glow {      position: absolute; width: 1400px; height: 1400px; top: 50%; left: 50%; transform: translate(-50%, -50%);      background: radial-gradient(ellipse at center, rgba(255,105,180,0.25) 0%, transparent 60%);      pointer-events: none; z-index: 1;    }    .url-text {      font-family: Montserrat, sans-serif;      font-size: 80px; font-weight: 900;      color: #FFFFFF;      letter-spacing: -0.02em;      z-index: 10;      text-align: center;    }    .caption-bar {      position: absolute; bottom: 0; left: 0; width: 100%;      padding: 40px 48px 48px;      background: linear-gradient(transparent, rgba(0,0,0,0.92));      z-index: 20;    }    .caption-text {      font-family: Montserrat, sans-serif;      font-size: 44px; font-weight: 700;      color: #FFFFFF; text-align: center;      letter-spacing: 0.02em; line-height: 1.3;    }    .caption-text .word {      opacity: 0.3;      transition: opacity 0.15s, color 0.15s, text-shadow 0.15s, transform 0.15s;      display: inline-block;    }    .caption-text .word.active {      opacity: 1;      color: #FF69B4;      text-shadow: 0 0 20px #FF69B4, 0 0 40px rgba(255,105,180,0.6);      transform: scale(1.15);    }  
</style>
</head>
<body>  <div id="root"    data-composition-id="beat6"    data-width="1080"    data-height="1920"    data-start="14.28"    data-duration="1.36">    <div class="radial-glow" id="glow6"></div>    <div class="url-text" id="urlText">TRDEFI.com</div>    <div class="caption-bar">      <div class="caption-text">        <span class="word" id="w1">Shop</span>        <span class="word" id="w2">TRDEFI.com</span>        <span class="word" id="w3">now!</span>      </div>    </div>  </div>  
<script>    window.__timelines = window.__timelines || {};    (function(){ const tl = gsap.timeline({ paused: true });    // Transcript: Shoptradefi.com(14.28-14.88) now!(14.88-15.64)    // Start 14.28, duration 1.36s (ends at 15.64)    const words = [      { id: 'w1', start: 0.0, end: 0.6 },      { id: 'w2', start: 0.6, end: 1.2 },      { id: 'w3', start: 1.2, end: 1.36 }    ];    words.forEach(w => {      tl.call(() => {        document.querySelectorAll('.caption-text .word').forEach(el => el.classList.remove('active'));        document.getElementById(w.id).classList.add('active');      }, null, w.start);    });    tl.call(() => { document.querySelectorAll('.caption-text .word').forEach(el => el.classList.remove('active')); }, null, 1.36);    // Glow breathes (finite within beat)    gsap.set('#glow6', { scale: 1, transformOrigin: '50% 50%' });    tl.to('#glow6', { scale: 1.1, duration: 1.36, ease: 'sine.inOut', yoyo: true });    // URL text glow pulse (finite)    gsap.set('#urlText', { opacity: 0, scale: 0.8 });    tl.to('#urlText', { opacity: 1, scale: 1, duration: 0.4, ease: 'expo.out' }, 0.1);    tl.to('#urlText', {      textShadow: '0 0 40px #FF69B4, 0 0 80px rgba(255,105,180,0.8)',      duration: 0.3, ease: 'sine.inOut', yoyo: true, repeat: 1    }, 0.3);    // Final fade to black    tl.to('#urlText', { opacity: 0, duration: 0.3, ease: 'power2.in' }, 1.06);        window.__timelines['beat6'] = tl;
    });

</script>

</body>
</html>
