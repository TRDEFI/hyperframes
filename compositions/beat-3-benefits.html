<!DOCTYPE html>
<html lang="en">
<head>  <meta charset="UTF-8" />  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <title>Beat 3 — Benefits</title>  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js">

</script>
  
<style>    * { margin: 0; padding: 0; box-sizing: border-box; }    body { background: #0A0A0A; overflow: hidden; }    .scene { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; overflow: hidden; display: none; }    #scene3 { display: flex; flex-direction: column; background: #0A0A0A; }    .radial-glow {      position: absolute; width: 1200px; height: 1200px;      top: 50%; left: 50%; transform: translate(-50%, -50%);      background: radial-gradient(ellipse at center, rgba(0,212,255,0.12) 0%, transparent 65%);      pointer-events: none; z-index: 1;    }    .bg-grid {      position: absolute; top: 0; left: 0; width: 100%; height: 100%;      background-image:        repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, transparent 1px, transparent 60px),        repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0px, transparent 1px, transparent 60px);      z-index: 2;    }    .product-img {      position: absolute;      bottom: 280px; left: 40px;      width: 480px; height: 580px;      object-fit: cover;      border-radius: 16px;      box-shadow: 0 40px 100px rgba(0,0,0,0.7);      z-index: 10;    }    .benefits-list {      position: absolute;      top: 160px; right: 50px;      width: 480px;      display: flex; flex-direction: column; gap: 24px;      z-index: 10;    }    .benefit-item {      display: flex; align-items: center; gap: 16px;      padding: 16px 20px;      background: rgba(255,255,255,0.04);      border-radius: 12px;      border-left: 4px solid #FF69B4;    }    .benefit-icon { font-size: 36px; flex-shrink: 0; }    .benefit-text {      font-family: Montserrat, sans-serif;      font-size: 32px; font-weight: 700;      color: #FFFFFF;      letter-spacing: 0.01em;    }    .accent-line {      position: absolute;      top: 0; left: 0; width: 6px; height: 100%;      background: linear-gradient(180deg, #FF69B4 0%, #FFE600 50%, #00D4FF 100%);      z-index: 5;    }    .caption-bar {      position: absolute; bottom: 0; left: 0; width: 100%;      padding: 40px 48px 48px;      background: linear-gradient(transparent, rgba(0,0,0,0.92));      z-index: 20;    }    .caption-text {      font-family: Montserrat, sans-serif;      font-size: 42px; font-weight: 700;      color: #FFFFFF; text-align: left;      letter-spacing: 0.02em; line-height: 1.3;    }    .caption-text .word {      opacity: 0.3;      transition: opacity 0.15s, color 0.15s, text-shadow 0.15s, transform 0.15s;      display: inline-block;    }    .caption-text .word.active {      opacity: 1;      color: #00D4FF;      text-shadow: 0 0 20px #00D4FF, 0 0 40px rgba(0,212,255,0.6);      transform: scale(1.12);    }  
</style>
</head>
<body>  <div id="root"    data-composition-id="beat3"    data-width="1080"    data-height="1920"    data-start="4.68"    data-duration="2.8">    <div class="radial-glow"></div>    <div class="bg-grid"></div>    <div class="accent-line"></div>    <img class="product-img" id="prodImg3" src="../product_photos/img_3.webp" alt="" />    <div class="benefits-list">      <div class="benefit-item" style="border-color:#FFE600;">        <span class="benefit-icon">✨</span>        <span class="benefit-text">Premium quality materials</span>      </div>      <div class="benefit-item" style="border-color:#00D4FF;">        <span class="benefit-icon">🐶</span>        <span class="benefit-text">Adorable design collection</span>      </div>      <div class="benefit-item" style="border-color:#FF69B4;">        <span class="benefit-icon">☁️</span>        <span class="benefit-text">Cloud-like comfort</span>      </div>      <div class="benefit-item" style="border-color:#FFE600;">        <span class="benefit-icon">🎁</span>        <span class="benefit-text">Perfect gift idea</span>      </div>    </div>    <div class="caption-bar">      <div class="caption-text">        <span class="word" id="w1">Premium</span>        <span class="word" id="w2">quality,</span>        <span class="word" id="w3">amazing</span>        <span class="word" id="w4">design.</span>      </div>    </div>  </div>  
<script>    window.__timelines = window.__timelines || {};    (function(){ const tl = gsap.timeline({ paused: true });    // Transcript timing: Premium(4.68-5.04) quality,(5.04-5.44) amazing(5.44-5.84) design.(5.84-6.6)    // Local start at 4.68, duration 2.8s    const words = [      { id: 'w1', start: 0.0, end: 0.36 },      { id: 'w2', start: 0.36, end: 0.76 },      { id: 'w3', start: 0.76, end: 1.16 },      { id: 'w4', start: 1.16, end: 1.92 }    ];    words.forEach(w => {      tl.call(() => {        document.querySelectorAll('.caption-text .word').forEach(el => el.classList.remove('active'));        document.getElementById(w.id).classList.add('active');      }, null, w.start);    });    tl.call(() => { document.querySelectorAll('.caption-text .word').forEach(el => el.classList.remove('active')); }, null, 1.92);    // Product image zoom ambient    gsap.set('#prodImg3', { scale: 0.92, opacity: 0 });    tl.to('#prodImg3', { scale: 1, opacity: 1, duration: 0.5, ease: 'power2.out' }, 0.1);    tl.to('#prodImg3', { scale: 1.04, duration: 2.8, ease: 'sine.inOut' }, 0.1);    // Benefits stagger from right    gsap.set('.benefit-item', { x: 80, opacity: 0 });    tl.to('.benefit-item:nth-child(1)', { x: 0, opacity: 1, duration: 0.5, ease: 'back.out(1.3)' }, 0.1);    tl.to('.benefit-item:nth-child(2)', { x: 0, opacity: 1, duration: 0.45, ease: 'back.out(1.3)' }, 0.2);    tl.to('.benefit-item:nth-child(3)', { x: 0, opacity: 1, duration: 0.4, ease: 'elastic.out(1, 0.5)' }, 0.3);    tl.to('.benefit-item:nth-child(4)', { x: 0, opacity: 1, duration: 0.35, ease: 'power2.out' }, 0.4);        window.__timelines['beat3'] = tl;
    });

</script>

</body>
</html>
