<!DOCTYPE html>
<html lang="en">
<head>  <meta charset="UTF-8" />  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <title>Beat 2 — Product Reveal</title>  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js">

</script>
  
<style>    * { margin: 0; padding: 0; box-sizing: border-box; }    body { background: #0A0A0A; overflow: hidden; }    .scene { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; overflow: hidden; display: none; }    #scene2 { display: flex; flex-direction: column; background: #1A1A2E; }    .radial-glow {      position: absolute; width: 1400px; height: 1400px;      top: 50%; left: 50%; transform: translate(-50%, -50%);      background: radial-gradient(ellipse at center, rgba(255,105,180,0.2) 0%, transparent 60%);      pointer-events: none; z-index: 1;    }    .bg-grid {      position: absolute; top: 0; left: 0; width: 100%; height: 100%;      background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, transparent 1px, transparent 80px),                        repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, transparent 1px, transparent 80px);      pointer-events: none; z-index: 2;    }    .product-zone {      position: absolute;      top: 120px; left: 40px;      width: 580px; height: 700px;      z-index: 10;    }    .product-img {      width: 100%; height: 100%;      object-fit: cover;      border-radius: 12px;      box-shadow: 0 30px 80px rgba(0,0,0,0.6);      transform: perspective(1200px) rotateY(-6deg);    }    .product-sparkles {      position: absolute; top: 0; left: 0; width: 100%; height: 100%;      pointer-events: none; z-index: 15;    }    .product-sparkle { position: absolute; opacity: 0.8; }    .text-zone {      position: absolute;      top: 160px; right: 40px;      width: 400px;      z-index: 10;    }    .brand-line {      font-family: Montserrat, sans-serif;      font-weight: 900;      font-size: 52px;      color: #FF69B4;      letter-spacing: 0.08em;      margin-bottom: 4px;      overflow: hidden;    }    .brand-line-inner { display: block; }    .product-name {      font-family: Montserrat, sans-serif;      font-weight: 900;      font-size: 88px;      color: #FFFFFF;      letter-spacing: -0.03em;      line-height: 0.95;      margin-bottom: 20px;      overflow: hidden;    }    .product-name-inner { display: block; }    .price-block { margin-bottom: 16px; overflow: hidden; }    .price-current {      font-family: Montserrat, sans-serif;      font-weight: 900;      font-size: 72px;      color: #FFE600;      letter-spacing: -0.02em;      text-shadow: 0 0 30px rgba(255,230,0,0.6);    }    .price-original {      font-family: Montserrat, sans-serif;      font-size: 32px;      color: #888;      text-decoration: line-through;      margin-left: 12px;    }    .rating-row {      display: flex; align-items: center; gap: 12px;      overflow: hidden;    }    .stars {      display: flex; gap: 4px;    }    .star { font-size: 28px; color: #FFE600; }    .review-count {      font-family: Inter, sans-serif;      font-size: 24px;      color: #B0B0B0;    }    .caption-bar {      position: absolute; bottom: 0; left: 0; width: 100%;      padding: 40px 48px 48px;      background: linear-gradient(transparent, rgba(0,0,0,0.92));      z-index: 20;    }    .caption-text {      font-family: Montserrat, sans-serif;      font-size: 42px; font-weight: 700;      color: #FFFFFF; text-align: left;      letter-spacing: 0.02em; line-height: 1.3;    }    .caption-text .word {      opacity: 0.3;      transition: opacity 0.15s, color 0.15s, text-shadow 0.15s, transform 0.15s;      display: inline-block;    }    .caption-text .word.active {      opacity: 1;      color: #FF69B4;      text-shadow: 0 0 20px #FF69B4, 0 0 40px rgba(255,105,180,0.6);      transform: scale(1.12);    }  
</style>
</head>
<body>  <div id="root"    data-composition-id="beat2"    data-width="1080"    data-height="1920"    data-start="2.36"    data-duration="2.32">    <div class="radial-glow"></div>    <div class="bg-grid"></div>    <div class="product-zone">      <img class="product-img" id="prodImg" src="../product_photos/img_2.webp" alt="" />      <div class="product-sparkles">        <div class="product-sparkle" style="top:80px; right:-20px;">          <svg width="32" height="32" viewBox="0 0 36 36"><path d="M18 0 L20.5 15.5 L36 18 L20.5 20.5 L18 36 L15.5 20.5 L0 18 L15.5 15.5 Z" fill="#FFE600"/></svg>        </div>        <div class="product-sparkle" style="top:200px; left:-10px;">          <svg width="24" height="24" viewBox="0 0 36 36"><path d="M18 0 L20.5 15.5 L36 18 L20.5 20.5 L18 36 L15.5 20.5 L0 18 L15.5 15.5 Z" fill="#00D4FF"/></svg>        </div>        <div class="product-sparkle" style="bottom:120px; right:40px;">          <svg width="28" height="28" viewBox="0 0 36 36"><path d="M18 0 L20.5 15.5 L36 18 L20.5 20.5 L18 36 L15.5 20.5 L0 18 L15.5 15.5 Z" fill="#FF69B4"/></svg>        </div>        <div class="product-sparkle" style="bottom:60px; left:60px;">          <svg width="20" height="20" viewBox="0 0 36 36"><path d="M18 0 L20.5 15.5 L36 18 L20.5 20.5 L18 36 L15.5 20.5 L0 18 L15.5 15.5 Z" fill="#FFE600"/></svg>        </div>      </div>    </div>    <div class="text-zone">      <div class="brand-line"><span class="brand-line-inner">TONGUE KISS</span></div>      <div class="product-name"><span class="product-name-inner">BIG EYE<br>DOG SLIPPERS</span></div>      <div class="price-block">        <span class="price-current">£25.41</span>        <span class="price-original">£31.99</span>      </div>      <div class="rating-row">        <div class="stars">          <span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span>        </div>        <span class="review-count">127 reviews</span>      </div>    </div>    <div class="caption-bar">      <div class="caption-text">        <span class="word" id="w1">They</span>        <span class="word" id="w2">are</span>        <span class="word" id="w3">absolutely</span>        <span class="word" id="w4">incredible.</span>      </div>    </div>  </div>  
<script>    window.__timelines = window.__timelines || {};    (function(){ const tl = gsap.timeline({ paused: true });    // Transcript word timing: [They(2.36-2.58) are(2.58-2.76) absolutely(2.76-3.28) incredible.(3.28-4.0)]    // Beat starts at 2.36, duration 2.32s    const words = [      { id: 'w1', start: 0.0, end: 0.22 },     // They      { id: 'w2', start: 0.22, end: 0.4 },     // are      { id: 'w3', start: 0.4, end: 0.92 },     // absolutely      { id: 'w4', start: 0.92, end: 1.64 }     // incredible.    ];    // Caption highlight loop    words.forEach(w => {      tl.call(() => {        document.querySelectorAll('.caption-text .word').forEach(el => el.classList.remove('active'));        document.getElementById(w.id).classList.add('active');      }, null, w.start);    });    tl.call(() => { document.querySelectorAll('.caption-text .word').forEach(el => el.classList.remove('active')); }, null, 1.64);    // Product image tumble in with perspective    gsap.set('#prodImg', { rotationY: -12, scale: 0.8, opacity: 0 });    tl.to('#prodImg', { rotationY: -6, scale: 1, opacity: 1, duration: 0.5, ease: 'back.out(1.2)' }, 0.1);    // Text stagger from right    gsap.set('.brand-line-inner', { y: -50, opacity: 0 });    gsap.set('.product-name-inner', { y: 60, opacity: 0 });    gsap.set('.price-block', { scale: 0.8, opacity: 0 });    gsap.set('.rating-row', { opacity: 0, x: 30 });    tl.to('.brand-line-inner', { y: 0, opacity: 1, duration: 0.4, ease: 'power2.out' }, 0.2);    tl.to('.product-name-inner', { y: 0, opacity: 1, duration: 0.5, ease: 'back.out(1.4)' }, 0.3);    tl.to('.price-block', { scale: 1, opacity: 1, duration: 0.3, ease: 'elastic.out(1, 0.5)' }, 0.5);    tl.to('.rating-row', { opacity: 1, x: 0, duration: 0.35, ease: 'power2.out' }, 0.6);    // Product sparkles    gsap.set('.product-sparkle', { scale: 0, opacity: 0 });    tl.to('.product-sparkle', { scale: 1, opacity: 0.8, stagger: 0.15, duration: 0.4, ease: 'elastic.out(1, 0.5)' }, 0.4);    // Ambient: slow zoom on product    tl.to('#prodImg', { scale: 1.04, duration: 2.32, ease: 'sine.inOut' }, 0.1);        window.__timelines['beat2'] = tl;
    });

</script>
