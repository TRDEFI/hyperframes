<!DOCTYPE html>
<html lang="en">
<head>  <meta charset="UTF-8" />  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <title>Beat 4 — Social Proof</title>  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js">

</script>
  
<style>    * { margin: 0; padding: 0; box-sizing: border-box; }    body { background: #0A0A0A; overflow: hidden; }    .scene { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; overflow: hidden; display: none; }    #scene4 { display: flex; align-items: center; justify-content: center; background: #1A0A2E; }    .radial-glow {      position: absolute; width: 1400px; height: 1400px; top: 50%; left: 50%; transform: translate(-50%, -50%);      background: radial-gradient(ellipse at center, rgba(255,105,180,0.18) 0%, transparent 60%);      pointer-events: none; z-index: 1;    }    .watermark-img {      position: absolute; top: 0; left: 0; width: 100%; height: 100%;      object-fit: cover; opacity: 0.12;      z-index: 2;    }    .testimonial-card {      position: relative; z-index: 10;      width: 800px; padding: 48px;      background: rgba(255,255,255,0.06);      border: 2px solid #FF69B4;      border-radius: 24px;      backdrop-filter: blur(12px);      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 60px rgba(255,105,180,0.15);    }    .card-top-line {      position: absolute; top: -2px; left: 48px; right: 48px; height: 3px;      background: linear-gradient(90deg, transparent, #FF69B4, transparent);      transform: scaleX(0);      transform-origin: left;    }    .quote-mark { font-size: 80px; color: #FF69B4; line-height: 1; margin-bottom: 8px; }    .quote-text {      font-family: Inter, sans-serif;      font-size: 38px; font-style: italic;      color: #FFFFFF; line-height: 1.4;      margin-bottom: 32px;    }    .stars-row {      display: flex; gap: 8px; margin-bottom: 16px;    }    .star { font-size: 40px; color: #FFE600; }    .attribution {      font-family: Montserrat, sans-serif;      font-size: 28px; font-weight: 700;      color: #FF69B4;    }    .caption-bar {      position: absolute; bottom: 0; left: 0; width: 100%;      padding: 40px 48px 48px;      background: linear-gradient(transparent, rgba(0,0,0,0.92));      z-index: 20;    }    .caption-text {      font-family: Montserrat, sans-serif;      font-size: 42px; font-weight: 700;      color: #FFFFFF; text-align: center;      letter-spacing: 0.02em; line-height: 1.3;    }    .caption-text .word {      opacity: 0.3;      transition: opacity 0.15s, color 0.15s, text-shadow 0.15s, transform 0.15s;      display: inline-block;    }    .caption-text .word.active {      opacity: 1;      color: #FFE600;      text-shadow: 0 0 20px #FFE600, 0 0 40px rgba(255,230,0,0.6);      transform: scale(1.12);    }  
</style>
</head>
<body>  <div id="root"    data-composition-id="beat4"    data-width="1080"    data-height="1920"    data-start="7.48"    data-duration="2.36">    <div class="radial-glow"></div>    <img class="watermark-img" id="wmark" src="../product_photos/img_4.webp" alt="" />    <div class="testimonial-card" id="tcard">      <div class="card-top-line" id="cardLine"></div>      <div class="quote-mark">"</div>      <div class="quote-text">These are the comfiest slippers I've ever owned.</div>      <div class="stars-row">        <span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span>      </div>      <div class="attribution">Sarah — London</div>    </div>    <div class="caption-bar">      <div class="caption-text">        <span class="word" id="w1">Sarah</span>        <span class="word" id="w2">says</span>        <span class="word" id="w3">5</span>        <span class="word" id="w4">stars.</span>      </div>    </div>  </div>  
<script>    window.__timelines = window.__timelines || {};    (function(){ const tl = gsap.timeline({ paused: true });    // Transcript: Sarah(7.48-7.8) says(7.8-8.12) 5(8.12-8.36) stars.(8.36-9.04)    // Start 7.48, duration 2.36s    const words = [      { id: 'w1', start: 0.0, end: 0.32 },      { id: 'w2', start: 0.32, end: 0.64 },      { id: 'w3', start: 0.64, end: 0.88 },      { id: 'w4', start: 0.88, end: 1.56 }    ];    words.forEach(w => {      tl.call(() => {        document.querySelectorAll('.caption-text .word').forEach(el => el.classList.remove('active'));        document.getElementById(w.id).classList.add('active');      }, null, w.start);    });    tl.call(() => { document.querySelectorAll('.caption-text .word').forEach(el => el.classList.remove('active')); }, null, 1.56);    // Card float animation (yoyo, runs once within beat)    gsap.set('#tcard', { y: 0 });    gsap.to('#tcard', { y: -12, duration: 1.18, ease: 'sine.inOut', yoyo: true, repeat: 0 }, 0);    // Card entrance: from small + fade    gsap.set('#tcard', { scale: 0.7, opacity: 0 });    tl.to('#tcard', { scale: 1, opacity: 1, duration: 0.5, ease: 'back.out(1.4)' }, 0.1);    // Top line draws in    tl.to('#cardLine', { scaleX: 1, duration: 0.4, ease: 'power2.out' }, 0.3);    // Stars burst    gsap.set('.star', { scale: 0 });    tl.to('.star', { scale: 1.2, opacity: 1, stagger: 0.08, duration: 0.3, ease: 'elastic.out(1, 0.5)' }, 0.5);    tl.to('.star', { scale: 1, duration: 0.2 }, 0.9);    // Watermark slow drift (runs once within beat duration)    gsap.set('#wmark', { scale: 1, transformOrigin: '50% 50%' });    gsap.to('#wmark', { scale: 1.06, duration: 2.36, ease: 'sine.inOut' });        window.__timelines['beat4'] = tl;
    });

</script>

</body>
</html>
