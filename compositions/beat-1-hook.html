<!DOCTYPE html>
<html lang="en">
<head>  <meta charset="UTF-8" />  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <title>Beat 1 — Hook</title>  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js">

</script>
  
<style>    * { margin: 0; padding: 0; box-sizing: border-box; }    body { background: #0A0A0A; overflow: hidden; }    .scene {      position: absolute;      top: 0; left: 0;      width: 1080px; height: 1920px;      overflow: hidden;      display: none;    }    .scene.active { display: flex; }    #scene1 {      display: flex;      flex-direction: column;      align-items: center;      justify-content: center;      background: #0A0A0A;    }    .bg-img {      position: absolute;      width: 100%; height: 100%;      object-fit: cover;      opacity: 0.6;    }    .radial-glow {      position: absolute;      width: 1400px; height: 1400px;      top: 50%; left: 50%;      transform: translate(-50%, -50%);      background: radial-gradient(ellipse at center,        rgba(255,105,180,0.25) 0%,        rgba(26,10,46,0.6) 40%,        transparent 70%);      pointer-events: none;    }    .ghost-text {      position: absolute;      font-family: Montserrat, sans-serif;      font-size: 280px;      font-weight: 900;      color: rgba(255,255,255,0.04);      letter-spacing: -0.05em;      top: 50%; left: 50%;      transform: translate(-50%, -50%);      white-space: nowrap;      user-select: none;    }    .hook-container {      position: relative;      z-index: 10;      text-align: center;    }    .wait-text {      font-family: Montserrat, sans-serif;      font-weight: 900;      font-size: 180px;      color: #FFFFFF;      letter-spacing: -0.04em;      line-height: 1;      text-shadow: 0 0 60px rgba(255,105,180,0.8), 0 0 120px rgba(255,105,180,0.4);    }    .sub-text {      font-family: Montserrat, sans-serif;      font-weight: 700;      font-size: 72px;      color: #FFE600;      letter-spacing: -0.02em;      margin-top: 8px;    }    .sparkles {      position: absolute;      top: 0; left: 0;      width: 100%; height: 100%;      pointer-events: none;      z-index: 15;    }    .sparkle {      position: absolute;      opacity: 0;    }    .sparkle svg { display: block; }    .caption-bar {      position: absolute;      bottom: 0; left: 0;      width: 100%;      padding: 40px 48px 48px;      background: linear-gradient(transparent, rgba(0,0,0,0.92));      z-index: 20;    }    .caption-text {      font-family: Montserrat, sans-serif;      font-size: 42px;      font-weight: 700;      color: #FFFFFF;      text-align: center;      letter-spacing: 0.02em;      line-height: 1.3;    }    .caption-text .word {      opacity: 0.3;      transition: opacity 0.15s ease, color 0.15s ease, text-shadow 0.15s ease, transform 0.15s ease;      display: inline-block;    }    .caption-text .word.active {      opacity: 1;      color: #FF69B4;      text-shadow: 0 0 20px #FF69B4, 0 0 40px rgba(255,105,180,0.6);      transform: scale(1.12);    }  
</style>
</head>
<body>  <div id="root"    data-composition-id="beat1"    data-width="1080"    data-height="1920"    data-start="0"    data-duration="2.36">    <!-- BG LAYER -->    <div class="radial-glow" id="glow1"></div>    <img class="bg-img" id="bgImg" src="../product_photos/img_1.webp" alt="" />    <div class="ghost-text" id="ghostText">TRDEFI</div>    <!-- MAIN CONTENT -->    <div class="hook-container" id="hookContainer">      <div class="wait-text" id="waitText">WAIT.</div>      <div class="sub-text" id="subText">these slippers?</div>    </div>    <!-- SPARKLES -->    <div class="sparkles" id="sparkles">      <div class="sparkle" id="sp1" style="top:180px; left:120px;">        <svg width="36" height="36" viewBox="0 0 36 36"><path d="M18 0 L20.5 15.5 L36 18 L20.5 20.5 L18 36 L15.5 20.5 L0 18 L15.5 15.5 Z" fill="#FFE600" opacity="0.9"/></svg>      </div>      <div class="sparkle" id="sp2" style="top:320px; right:140px;">        <svg width="28" height="28" viewBox="0 0 36 36"><path d="M18 0 L20.5 15.5 L36 18 L20.5 20.5 L18 36 L15.5 20.5 L0 18 L15.5 15.5 Z" fill="#00D4FF" opacity="0.85"/></svg>      </div>      <div class="sparkle" id="sp3" style="bottom:380px; left:200px;">        <svg width="44" height="44" viewBox="0 0 36 36"><path d="M18 0 L20.5 15.5 L36 18 L20.5 20.5 L18 36 L15.5 20.5 L0 18 L15.5 15.5 Z" fill="#FF69B4" opacity="0.9"/></svg>      </div>      <div class="sparkle" id="sp4" style="top:240px; right:200px;">        <svg width="24" height="24" viewBox="0 0 36 36"><path d="M18 0 L20.5 15.5 L36 18 L20.5 20.5 L18 36 L15.5 20.5 L0 18 L15.5 15.5 Z" fill="#FFE600" opacity="0.8"/></svg>      </div>      <div class="sparkle" id="sp5" style="bottom:440px; right:160px;">        <svg width="32" height="32" viewBox="0 0 36 36"><path d="M18 0 L20.5 15.5 L36 18 L20.5 20.5 L18 36 L15.5 20.5 L0 18 L15.5 15.5 Z" fill="#00D4FF" opacity="0.9"/></svg>      </div>    </div>    <!-- CAPTION BAR -->    <div class="caption-bar">      <div class="caption-text" id="captionText">        <span class="word" id="w1">Wait,</span>        <span class="word" id="w2">these</span>        <span class="word" id="w3">slippers?</span>      </div>    </div>  </div>  
<script>    window.__timelines = window.__timelines || {};    (function(){ const tl = gsap.timeline({ paused: true });    // Word timing from transcript.json    const words = [      { id: 'w1', start: 0.0, end: 0.36 },      { id: 'w2', start: 0.36, end: 0.72 },      { id: 'w3', start: 0.72, end: 1.32 }    ];    // Caption word highlight loop    words.forEach(w => {      tl.call(() => {        document.querySelectorAll('.caption-text .word').forEach(el => el.classList.remove('active'));        document.getElementById(w.id).classList.add('active');      }, null, w.start);    });    // Ambient animations (start at 0)    // Ambient: glow breathes once (2.36s beat - cycle is 4s so just runs once)    gsap.set('#glow1', { scale: 1, transformOrigin: '50% 50%' });    gsap.to('#glow1', { scale: 1.08, duration: 2.36, ease: 'sine.inOut', yoyo: true });    // Ghost text drift — run once (10s cycle > 2.36s beat)    gsap.set('#ghostText', { x: 0, y: 0 });    gsap.to('#ghostText', { x: 15, y: 8, duration: 2.36, ease: 'sine.inOut' });    // BG image slow zoom (ambient throughout entire beat)    gsap.set('#bgImg', { scale: 1, transformOrigin: '50% 50%' });    tl.to('#bgImg', { scale: 1.06, duration: 2.36, ease: 'sine.inOut' }, 0);    // ENTRANCE ANIMATIONS    // WAIT. slams in from scale 0.7    gsap.set('#waitText', { scale: 0.7, opacity: 0 });    tl.to('#waitText', { scale: 1, opacity: 1, duration: 0.4, ease: 'expo.out' }, 0.15);    // sub-text drops with overshoot    gsap.set('#subText', { y: 60, opacity: 0 });    tl.to('#subText', { y: 0, opacity: 1, duration: 0.5, ease: 'back.out(1.4)' }, 0.35);    // Sparkles burst in staggered    gsap.set('.sparkle', { scale: 0, opacity: 0 });    tl.to('#sp1', { scale: 1, opacity: 1, duration: 0.4, ease: 'elastic.out(1, 0.5)' }, 0.2);    tl.to('#sp2', { scale: 1, opacity: 1, duration: 0.4, ease: 'elastic.out(1, 0.5)' }, 0.3);    tl.to('#sp3', { scale: 1, opacity: 1, duration: 0.4, ease: 'elastic.out(1, 0.5)' }, 0.4);    tl.to('#sp4', { scale: 1, opacity: 1, duration: 0.4, ease: 'elastic.out(1, 0.5)' }, 0.5);    tl.to('#sp5', { scale: 1, opacity: 1, duration: 0.4, ease: 'elastic.out(1, 0.5)' }, 0.6);    // Deactivate last word at end    tl.call(() => { document.querySelectorAll('.caption-text .word').forEach(el => el.classList.remove('active')); }, null, 1.32);        window.__timelines['beat1'] = tl;
    });

</script>

</body>
</html>
