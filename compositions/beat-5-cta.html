<!DOCTYPE html>
<html lang="en">
<head>  <meta charset="UTF-8" />  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <title>Beat 5 — Urgency + CTA</title>  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js">

</script>
  
<style>    * { margin: 0; padding: 0; box-sizing: border-box; }    body { background: #0A0A0A; overflow: hidden; }    .scene { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; overflow: hidden; display: none; }    #scene5 { display: flex; flex-direction: column; align-items: center; background: #0A0A0A; }    .radial-glow {      position: absolute; width: 1400px; height: 1400px; top: 50%; left: 50%; transform: translate(-50%, -50%);      background: radial-gradient(ellipse at center, rgba(255,51,102,0.15) 0%, transparent 55%);      pointer-events: none; z-index: 1;    }    .ghost-text {      position: absolute;      font-family: Montserrat, sans-serif;      font-size: 240px; font-weight: 900;      color: rgba(255,255,255,0.05);      letter-spacing: -0.04em;      top: 50%; left: 50%;      transform: translate(-50%, -50%);      white-space: nowrap;      user-select: none;      z-index: 2;    }    .urgency-label {      font-family: Montserrat, sans-serif;      font-size: 48px; font-weight: 700;      color: #FF3366;      letter-spacing: 0.12em;      margin-bottom: 16px;      overflow: hidden;    }    .urgency-label-inner { display: inline-block; }    .price-hero {      font-family: Montserrat, sans-serif;      font-size: 140px; font-weight: 900;      color: #FFE600;      letter-spacing: -0.04em;      text-shadow: 0 0 60px rgba(255,230,0,0.7), 0 0 120px rgba(255,230,0,0.4);      margin-bottom: 12px;    }    .savings-badge {      font-family: Inter, sans-serif;      font-size: 28px; font-weight: 600;      color: #00FF88;      background: rgba(0,255,136,0.12);      padding: 8px 20px;      border-radius: 20px;      border: 1px solid rgba(0,255,136,0.3);      margin-bottom: 8px;    }    .orig-price {      font-family: Montserrat, sans-serif;      font-size: 36px;      color: #888;      text-decoration: line-through;      margin-bottom: 40px;    }    .cta-button {      font-family: Montserrat, sans-serif;      font-size: 48px; font-weight: 700;      color: #FFFFFF;      background: linear-gradient(135deg, #FF69B4 0%, #FF3366 100%);      padding: 20px 80px;      border-radius: 16px;      box-shadow: 0 8px 40px rgba(255,105,180,0.5), 0 0 80px rgba(255,105,180,0.3);      cursor: pointer;      letter-spacing: 0.04em;      transform-origin: center;    }    .caption-bar {      position: absolute; bottom: 0; left: 0; width: 100%;      padding: 40px 48px 48px;      background: linear-gradient(transparent, rgba(0,0,0,0.92));      z-index: 20;    }    .caption-text {      font-family: Montserrat, sans-serif;      font-size: 40px; font-weight: 700;      color: #FFFFFF; text-align: center;      letter-spacing: 0.02em; line-height: 1.3;    }    .caption-text .word {      opacity: 0.3;      transition: opacity 0.15s, color 0.15s, text-shadow 0.15s, transform 0.15s;      display: inline-block;    }    .caption-text .word.active {      opacity: 1;      color: #FF3366;      text-shadow: 0 0 20px #FF3366, 0 0 40px rgba(255,51,102,0.6);      transform: scale(1.15);    }  
</style>
</head>
<body>  <div id="root"    data-composition-id="beat5"    data-width="1080"    data-height="1920"    data-start="9.84"    data-duration="4.44">    <div class="radial-glow"></div>    <div class="ghost-text">TRDEFI</div>    <div style="position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; margin-top: 200px;">      <div class="urgency-label" id="urgLabel">        <span class="urgency-label-inner">⏰ LIMITED STOCK</span>      </div>      <div class="price-hero">£25.41</div>      <div class="savings-badge">You save £6.58</div>      <div class="orig-price">£31.99</div>      <div class="cta-button" id="ctaBtn">SHOP NOW</div>    </div>    <div class="caption-bar">      <div class="caption-text">        <span class="word" id="w1">Limited</span>        <span class="word" id="w2">stock</span>        <span class="word" id="w3">available</span>        <span class="word" id="w4">now.</span>        <span class="word" id="w5">You</span>        <span class="word" id="w6">save</span>        <span class="word" id="w7">20%</span>        <span class="word" id="w8">today.</span>      </div>    </div>  </div>  
<script>    window.__timelines = window.__timelines || {};    (function(){ const tl = gsap.timeline({ paused: true });    // Transcript: Limited(9.84-10.28) stock(10.28-10.64) available(10.64-11.08) now.(11.08-11.6)    //            You(12.12-12.32) save(12.32-12.6) 20%(12.6-12.96) today.(12.96-13.6)    // Total start: 9.84, duration: 4.44s (ends at 14.28)    // Local times: w1=0, w2=0.44, w3=0.8, w4=1.24, w5=2.28, w6=2.48, w7=2.76, w8=3.12    const words = [      { id: 'w1', start: 0.0, end: 0.44 },      { id: 'w2', start: 0.44, end: 0.8 },      { id: 'w3', start: 0.8, end: 1.24 },      { id: 'w4', start: 1.24, end: 1.76 },      { id: 'w5', start: 2.28, end: 2.48 },      { id: 'w6', start: 2.48, end: 2.76 },      { id: 'w7', start: 2.76, end: 3.12 },      { id: 'w8', start: 3.12, end: 3.76 }    ];    words.forEach(w => {      tl.call(() => {        document.querySelectorAll('.caption-text .word').forEach(el => el.classList.remove('active'));        document.getElementById(w.id).classList.add('active');      }, null, w.start);    });    tl.call(() => { document.querySelectorAll('.caption-text .word').forEach(el => el.classList.remove('active')); }, null, 3.76);    // Urgency label flicker (finite repeat within 4.44s beat)    gsap.set('#urgLabel', { opacity: 0 });    tl.to('#urgLabel', { opacity: 1, duration: 0.3 }, 0.1);    tl.to('#urgLabel', { opacity: 0.7, duration: 0.4, ease: 'sine.inOut', yoyo: true, repeat: 10 }, 0.5);    // Price stamp in    gsap.set('.price-hero', { scale: 0.85, opacity: 0 });    tl.to('.price-hero', { scale: 1, opacity: 1, duration: 0.4, ease: 'expo.out' }, 0.15);    // Savings badge pop    gsap.set('.savings-badge', { scale: 0.7, opacity: 0 });    tl.to('.savings-badge', { scale: 1, opacity: 1, duration: 0.35, ease: 'elastic.out(1, 0.5)' }, 0.3);    // Orig price fade    gsap.set('.orig-price', { opacity: 0 });    tl.to('.orig-price', { opacity: 1, duration: 0.3 }, 0.45);    // CTA button pulse (finite repeat within 4.44s beat, 0.8s cycle)    gsap.set('#ctaBtn', { scale: 0.6, opacity: 0 });    tl.to('#ctaBtn', { scale: 1, opacity: 1, duration: 0.5, ease: 'elastic.out(1, 0.4)' }, 0.5);    tl.to('#ctaBtn', { scale: 1.06, duration: 0.4, ease: 'sine.inOut', yoyo: true, repeat: 4 }, 1.0);    // Ghost text drift (run once)    gsap.set('.ghost-text', { x: 0, y: 0 });    gsap.to('.ghost-text', { x: -20, y: 10, duration: 4.44, ease: 'sine.inOut' });        window.__timelines['beat5'] = tl;
    });

</script>

</body>
</html>
